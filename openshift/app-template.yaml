apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: django-photo-album
  annotations:
    description: Build and deploy the Django photo album application on OpenShift.
parameters:
  - name: APP_NAME
    value: felhoalapu-hf1
    required: true
  - name: GIT_REPO_URL
    required: true
  - name: GIT_REF
    value: master
    required: true
  - name: GITHUB_WEBHOOK_SECRET
    generate: expression
    from: "[a-zA-Z0-9]{40}"
  - name: SECRET_KEY
    generate: expression
    from: "[a-zA-Z0-9]{50}"
  - name: POSTGRES_HOST
    required: true
  - name: POSTGRES_PORT
    value: "5432"
  - name: POSTGRES_DB
    value: album
    required: true
  - name: POSTGRES_USER
    value: album
    required: true
  - name: POSTGRES_PASSWORD
    generate: expression
    from: "[a-zA-Z0-9]{24}"
  - name: ALLOWED_HOSTS
    value: "*"
    required: true
  - name: CSRF_TRUSTED_ORIGINS
    value: ""
  - name: GUNICORN_WORKERS
    value: "2"
  - name: POSTGRES_CONN_MAX_AGE
    value: "120"
  - name: CPU_REQUEST
    value: "50m"
  - name: CPU_LIMIT
    value: "250m"
  - name: MEMORY_REQUEST
    value: "256Mi"
  - name: MEMORY_LIMIT
    value: "512Mi"

objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${APP_NAME}-app-env
    type: Opaque
    stringData:
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${APP_NAME}-github-webhook
    type: Opaque
    stringData:
      WebHookSecretKey: ${GITHUB_WEBHOOK_SECRET}
  - apiVersion: image.openshift.io/v1
    kind: ImageStream
    metadata:
      name: ${APP_NAME}
  - apiVersion: build.openshift.io/v1
    kind: BuildConfig
    metadata:
      name: ${APP_NAME}
    spec:
      runPolicy: SerialLatestOnly
      source:
        type: Git
        git:
          uri: ${GIT_REPO_URL}
          ref: ${GIT_REF}
      strategy:
        type: Docker
        dockerStrategy:
          dockerfilePath: Dockerfile
      output:
        to:
          kind: ImageStreamTag
          name: ${APP_NAME}:latest
      triggers:
        - type: ConfigChange
        - type: GitHub
          github:
            secretReference:
              name: ${APP_NAME}-github-webhook
  - apiVersion: v1
    kind: Service
    metadata:
      name: ${APP_NAME}
    spec:
      selector:
        app: ${APP_NAME}
        deploymentconfig: ${APP_NAME}
      ports:
        - name: http
          port: 8000
          targetPort: 8000
  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: ${APP_NAME}
    spec:
      to:
        kind: Service
        name: ${APP_NAME}
      port:
        targetPort: http
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
  - apiVersion: apps.openshift.io/v1
    kind: DeploymentConfig
    metadata:
      name: ${APP_NAME}
    spec:
      replicas: 1
      selector:
        app: ${APP_NAME}
        deploymentconfig: ${APP_NAME}
      strategy:
        type: Rolling
      triggers:
        - type: ConfigChange
        - type: ImageChange
          imageChangeParams:
            automatic: true
            containerNames:
              - web
            from:
              kind: ImageStreamTag
              name: ${APP_NAME}:latest
      template:
        metadata:
          labels:
            app: ${APP_NAME}
            deploymentconfig: ${APP_NAME}
        spec:
          containers:
            - name: web
              image: ""
              imagePullPolicy: Always
              ports:
                - containerPort: 8000
                  protocol: TCP
              env:
                - name: PORT
                  value: "8000"
                - name: DEBUG
                  value: "False"
                - name: ALLOWED_HOSTS
                  value: ${ALLOWED_HOSTS}
                - name: CSRF_TRUSTED_ORIGINS
                  value: ${CSRF_TRUSTED_ORIGINS}
                - name: GUNICORN_WORKERS
                  value: ${GUNICORN_WORKERS}
                - name: POSTGRES_CONN_MAX_AGE
                  value: ${POSTGRES_CONN_MAX_AGE}
                - name: SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ${APP_NAME}-app-env
                      key: SECRET_KEY
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: ${APP_NAME}-app-env
                      key: POSTGRES_HOST
                - name: POSTGRES_PORT
                  valueFrom:
                    secretKeyRef:
                      name: ${APP_NAME}-app-env
                      key: POSTGRES_PORT
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: ${APP_NAME}-app-env
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: ${APP_NAME}-app-env
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${APP_NAME}-app-env
                      key: POSTGRES_PASSWORD
              readinessProbe:
                httpGet:
                  path: /healthz/ready/
                  port: 8000
                initialDelaySeconds: 5
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
              livenessProbe:
                httpGet:
                  path: /healthz/live/
                  port: 8000
                initialDelaySeconds: 15
                periodSeconds: 20
                timeoutSeconds: 3
                failureThreshold: 3
              startupProbe:
                httpGet:
                  path: /healthz/live/
                  port: 8000
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 12
              resources:
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
                limits:
                  cpu: ${CPU_LIMIT}
                  memory: ${MEMORY_LIMIT}
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: ${APP_NAME}
    spec:
      scaleTargetRef:
        apiVersion: apps.openshift.io/v1
        kind: DeploymentConfig
        name: ${APP_NAME}
      minReplicas: 1
      maxReplicas: 5
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 60
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Max
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 2
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          selectPolicy: Max
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
            - type: Pods
              value: 1
              periodSeconds: 60

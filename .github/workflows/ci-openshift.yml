name: CI and OpenShift Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: openshift-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Django tests
        env:
          SECRET_KEY: github-actions-test-secret
          USE_SQLITE: "1"
        run: uv run python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/master'
    env:
      APP_NAME: ${{ vars.OPENSHIFT_APP_NAME }}
      GIT_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      GIT_REF: ${{ github.ref_name }}
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      POSTGRES_DB: ${{ vars.OPENSHIFT_POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.OPENSHIFT_POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_IMAGE: ${{ vars.OPENSHIFT_POSTGRES_IMAGE }}
      POSTGRES_STORAGE_SIZE: ${{ vars.OPENSHIFT_POSTGRES_STORAGE_SIZE || '1Gi' }}
      ALLOWED_HOSTS: ${{ vars.OPENSHIFT_ALLOWED_HOSTS }}
      CSRF_TRUSTED_ORIGINS: ${{ vars.OPENSHIFT_CSRF_TRUSTED_ORIGINS || '' }}
      GUNICORN_WORKERS: ${{ vars.OPENSHIFT_GUNICORN_WORKERS || '2' }}
      POSTGRES_CONN_MAX_AGE: ${{ vars.OPENSHIFT_POSTGRES_CONN_MAX_AGE || '120' }}
      CPU_REQUEST: ${{ vars.OPENSHIFT_CPU_REQUEST || '50m' }}
      CPU_LIMIT: ${{ vars.OPENSHIFT_CPU_LIMIT || '250m' }}
      MEMORY_REQUEST: ${{ vars.OPENSHIFT_MEMORY_REQUEST || '256Mi' }}
      MEMORY_LIMIT: ${{ vars.OPENSHIFT_MEMORY_LIMIT || '512Mi' }}
      POSTGRES_CPU_REQUEST: ${{ vars.OPENSHIFT_POSTGRES_CPU_REQUEST || '50m' }}
      POSTGRES_CPU_LIMIT: ${{ vars.OPENSHIFT_POSTGRES_CPU_LIMIT || '250m' }}
      POSTGRES_MEMORY_REQUEST: ${{ vars.OPENSHIFT_POSTGRES_MEMORY_REQUEST || '256Mi' }}
      POSTGRES_MEMORY_LIMIT: ${{ vars.OPENSHIFT_POSTGRES_MEMORY_LIMIT || '512Mi' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install oc
        uses: redhat-actions/oc-installer@v1

      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Reconcile OpenShift template
        run: ./scripts/openshift/apply-template.sh

      - name: Wait for PostgreSQL
        run: ./scripts/openshift/wait-for-postgres.sh

      - name: Build application image
        run: oc start-build "bc/${APP_NAME}" --wait --follow

      - name: Run database migrations
        run: ./scripts/openshift/run-migrations.sh

      - name: Wait for application rollout
        run: oc rollout status "dc/${APP_NAME}" --watch=true

      - name: Smoke check route health
        run: |
          set -euo pipefail

          route_host="$(oc get "route/${APP_NAME}" -o jsonpath='{.spec.host}')"
          if [ -z "${route_host}" ]; then
            echo "Route ${APP_NAME} does not have a host." >&2
            exit 1
          fi

          for endpoint in live ready; do
            passed=0
            for attempt in $(seq 1 12); do
              if curl --fail --silent --show-error "https://${route_host}/healthz/${endpoint}/" >/dev/null; then
                passed=1
                break
              fi
              sleep 5
            done

            if [ "${passed}" -ne 1 ]; then
              echo "Smoke check failed for /healthz/${endpoint}/ on https://${route_host}." >&2
              exit 1
            fi
          done
